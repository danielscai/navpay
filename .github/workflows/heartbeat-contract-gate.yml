name: Heartbeat Contract Gate

on:
  pull_request:
    paths:
      - 'docs/architecture/heartbeat/**'
      - 'tools/heartbeat/**'
      - 'navpay-android/app/src/main/java/com/navpay/heartbeat/**'
      - 'navpay-phonepe/src/apk/heartbeat_bridge/src/main/java/com/heartbeatbridge/**'
  push:
    branches:
      - main
      - master
    paths:
      - 'docs/architecture/heartbeat/**'
      - 'tools/heartbeat/**'
      - 'navpay-android/app/src/main/java/com/navpay/heartbeat/**'
      - 'navpay-phonepe/src/apk/heartbeat_bridge/src/main/java/com/heartbeatbridge/**'

jobs:
  verify-heartbeat-contract:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Verify shared heartbeat contract
        run: python3 tools/heartbeat/verify_contract.py
